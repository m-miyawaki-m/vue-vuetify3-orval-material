openapi: 3.0.3
info:
  title: App API
  version: 1.0.0

paths:
  /menu:
    get:
      operationId: getMenu
      summary: メインメニュー取得
      tags: [menu]
      responses:
        '200':
          description: メインメニュー一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuItem'
              example:
                $ref: './examples/menu.json'

  /products:
    get:
      operationId: getProducts
      summary: 商品一覧取得
      tags: [products]
      parameters:
        - name: q
          in: query
          description: キーワード検索（name・description を対象）
          schema:
            type: string
        - name: category
          in: query
          description: カテゴリフィルタ
          schema:
            $ref: '#/components/schemas/ProductCategory'
        - name: inStock
          in: query
          description: 在庫ありのみ
          schema:
            type: boolean
        - name: page
          in: query
          description: ページ番号（1始まり）
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          description: 1ページあたりの件数
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 5
      responses:
        '200':
          description: 商品一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
              example:
                $ref: './examples/products-list.json'

    post:
      operationId: postProduct
      summary: 商品登録
      tags: [products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: 登録した商品
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: 入力エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/stock-search:
    post:
      operationId: searchStockProducts
      summary: 在庫検索（在庫検索画面専用の検索条件で商品を検索）
      tags: [products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockSearchCondition'
      responses:
        '200':
          description: 検索結果（商品一覧と同形式）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
              example:
                $ref: './examples/products-list.json'

  /products/{id}:
    get:
      operationId: getProductById
      summary: 商品詳細取得
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 商品詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
              example:
                $ref: './examples/product-detail.json'
        '404':
          description: 商品が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    MenuChild:
      type: object
      required: [label, to]
      properties:
        label:
          type: string
        to:
          type: string
        icon:
          type: string

    MenuItem:
      type: object
      required: [id, label, icon, children]
      properties:
        id:
          type: string
        label:
          type: string
        icon:
          type: string
        children:
          type: array
          items:
            $ref: '#/components/schemas/MenuChild'

    ProductCategory:
      type: string
      enum:
        - 食品
        - 電子機器
        - ファッション
        - 家具
        - スポーツ

    Review:
      type: object
      required: [id, author, rating, comment]
      properties:
        id:
          type: integer
        author:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string

    ProductInput:
      type: object
      required: [name, category, price, inStock, description]
      properties:
        name:
          type: string
        category:
          $ref: '#/components/schemas/ProductCategory'
        price:
          type: integer
          description: 価格（円）
        inStock:
          type: boolean
        description:
          type: string

    StockSearchCondition:
      type: object
      description: 在庫検索画面専用の検索条件（画面固有オブジェクトのお手本。プロパティ構成は画面ごとに自由に定義する）
      properties:
        keywords:
          type: array
          description: キーワード（複数指定時は OR。name・description を対象）
          items:
            type: string
        categories:
          type: array
          description: カテゴリ（複数指定時は OR）
          items:
            $ref: '#/components/schemas/ProductCategory'
        inStockOnly:
          type: boolean
          description: 在庫ありのみに絞り込む

    Product:
      type: object
      required: [id, name, category, price, inStock, description, rating, reviews]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          $ref: '#/components/schemas/ProductCategory'
        price:
          type: integer
          description: 価格（円）
        inStock:
          type: boolean
        description:
          type: string
        rating:
          type: number
          minimum: 0
          maximum: 5
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/Review'

    ProductListResponse:
      type: object
      required: [items, total, page, pageSize, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        total:
          type: integer
          description: フィルタ後の総件数
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
