openapi: 3.0.3
info:
  title: Products API
  version: 1.0.0

paths:
  /products:
    get:
      operationId: getProducts
      summary: 商品一覧取得
      parameters:
        - name: q
          in: query
          description: キーワード検索（name・description を対象）
          schema:
            type: string
        - name: category
          in: query
          description: カテゴリフィルタ
          schema:
            $ref: '#/components/schemas/ProductCategory'
        - name: inStock
          in: query
          description: 在庫ありのみ
          schema:
            type: boolean
        - name: page
          in: query
          description: ページ番号（1始まり）
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          description: 1ページあたりの件数
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 5
      responses:
        '200':
          description: 商品一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
              example:
                items:
                  - id: 1
                    name: オーガニック緑茶
                    category: 食品
                    price: 1200
                    inStock: true
                    description: 厳選された国産茶葉を使用した風味豊かな緑茶。
                    rating: 4
                    reviews:
                      - { id: 1, author: 田中太郎, rating: 5, comment: 香りが良く飲みやすいです。 }
                      - { id: 2, author: 鈴木花子, rating: 3, comment: 普通です。値段の割に量が少ない。 }
                  - id: 2
                    name: 天然蜂蜜
                    category: 食品
                    price: 2500
                    inStock: true
                    description: 国産百花蜜。添加物一切不使用の純粋蜂蜜。
                    rating: 5
                    reviews:
                      - { id: 3, author: 山田一郎, rating: 5, comment: 濃厚で美味しい！リピート確定。 }
                  - id: 11
                    name: ワイヤレスイヤホン
                    category: 電子機器
                    price: 8900
                    inStock: true
                    description: Bluetooth 5.3対応。最大30時間再生。IPX5防水。
                    rating: 4
                    reviews:
                      - { id: 14, author: 田中誠, rating: 5, comment: 音質が良くてコスパ最高。 }
                      - { id: 15, author: 鈴木良子, rating: 3, comment: フィット感がもう少し欲しい。 }
                  - id: 21
                    name: コットンTシャツ
                    category: ファッション
                    price: 2800
                    inStock: true
                    description: 100%オーガニックコットン。シンプルなクルーネック。
                    rating: 4
                    reviews:
                      - { id: 27, author: 吉田真由美, rating: 4, comment: 肌触りが良くて気持ちいい。 }
                  - id: 41
                    name: ヨガマット 6mm
                    category: スポーツ
                    price: 3800
                    inStock: true
                    description: 滑り止め加工。軽量&収納袋付き。環境配慮素材。
                    rating: 4
                    reviews:
                      - { id: 50, author: 村上祐子, rating: 5, comment: クッションがちょうど良い厚さ。 }
                total: 50
                page: 1
                pageSize: 5
                totalPages: 10

  /products/{id}:
    get:
      operationId: getProductById
      summary: 商品詳細取得
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 商品詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
              example:
                id: 1
                name: オーガニック緑茶
                category: 食品
                price: 1200
                inStock: true
                description: 厳選された国産茶葉を使用した風味豊かな緑茶。
                rating: 4
                reviews:
                  - { id: 1, author: 田中太郎, rating: 5, comment: 香りが良く飲みやすいです。 }
                  - { id: 2, author: 鈴木花子, rating: 3, comment: 普通です。値段の割に量が少ない。 }
        '404':
          description: 商品が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:

    ProductCategory:
      type: string
      enum:
        - 食品
        - 電子機器
        - ファッション
        - 家具
        - スポーツ

    Review:
      type: object
      required: [id, author, rating, comment]
      properties:
        id:
          type: integer
        author:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string

    Product:
      type: object
      required: [id, name, category, price, inStock, description, rating, reviews]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          $ref: '#/components/schemas/ProductCategory'
        price:
          type: integer
          description: 価格（円）
        inStock:
          type: boolean
        description:
          type: string
        rating:
          type: number
          minimum: 0
          maximum: 5
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/Review'

    ProductListResponse:
      type: object
      required: [items, total, page, pageSize, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        total:
          type: integer
          description: フィルタ後の総件数
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
